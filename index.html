// ==================== FIREBASE HELPERS ====================
async function fbSaveDoc(collectionName, id, data) {
    if (!window.db) return;
    try { await window.fsSetDoc(window.fsDoc(window.db, collectionName, String(id)), data); } catch(e) { console.error(e); }
}
async function fbDeleteDoc(collectionName, id) {
    if (!window.db) return;
    try { await window.fsDeleteDoc(window.fsDoc(window.db, collectionName, String(id))); } catch(e) { console.error(e); }
}
async function fbLoadCollection(collectionName) {
    if (!window.db) return [];
    try {
        const snap = await window.fsGetDocs(window.fsCollection(window.db, collectionName));
        return snap.docs.map(d => d.data());
    } catch(e) { return []; }
}
async function saveAllData() {
    if (!window.db) return;
    ensurePauseRotation();
    const batch = window.fsWriteBatch(window.db);
    const saveList = [
        { col: 'collaborators', arr: collaborators },
        { col: 'pointages', arr: pointages },
        { col: 'absences', arr: absences },
        { col: 'comments', arr: comments },
        { col: 'pauses', arr: pauses },
        { col: 'teams', arr: teams },
        { col: 'contracts', arr: contracts },
        { col: 'leaveRequests', arr: leaveRequests },
        { col: 'rhDocuments', arr: rhDocuments },
        { col: 'salaries', arr: salaries },
        { col: 'plannings', arr: plannings }
    ];
    for (const { col, arr } of saveList) {
        for (const item of arr) {
            if (item && item.id !== undefined) batch.set(window.fsDoc(window.db, col, String(item.id)), item);
        }
    }
    batch.set(window.fsDoc(window.db, 'config', 'settings'), settings);
    batch.set(window.fsDoc(window.db, 'config', 'counters'), counters);
    try { await batch.commit(); } catch(e) { console.error(e); }
}
async function loadAllData() {
    if (!window.db) return;
    const [
        collabsSnap, pointagesSnap, absencesSnap, commentsSnap, pausesSnap,
        teamsSnap, contractsSnap, leavesSnap, docsSnap, salariesSnap, planningsSnap,
        settingsSnap, countersSnap
    ] = await Promise.all([
        fbLoadCollection('collaborators'), fbLoadCollection('pointages'), fbLoadCollection('absences'),
        fbLoadCollection('comments'), fbLoadCollection('pauses'), fbLoadCollection('teams'),
        fbLoadCollection('contracts'), fbLoadCollection('leaveRequests'), fbLoadCollection('rhDocuments'),
        fbLoadCollection('salaries'), fbLoadCollection('plannings'),
        window.fsGetDoc(window.fsDoc(window.db, 'config', 'settings')).catch(()=>null),
        window.fsGetDoc(window.fsDoc(window.db, 'config', 'counters')).catch(()=>null)
    ]);
    collaborators = collabsSnap;
    pointages = pointagesSnap;
    absences = absencesSnap;
    comments = commentsSnap;
    pauses = pausesSnap;
    teams = teamsSnap;
    contracts = contractsSnap;
    leaveRequests = leavesSnap;
    rhDocuments = docsSnap;
    salaries = salariesSnap;
    plannings = planningsSnap;
    if (settingsSnap && settingsSnap.exists) settings = settingsSnap.data();
    if (countersSnap && countersSnap.exists) counters = countersSnap.data();
    if (collaborators.length === 0) await initDefaultData();
    ensurePauseRotation();
    for (const c of collaborators) {
        if (!plannings.find(p => p.collaboratorId === c.id)) {
            plannings.push({
                id: `plan_${c.id}`,
                collaboratorId: c.id,
                startTime: "09:00",
                endTime: "18:00",
                breaks: [
                    { type: "matin", start: "10:30", duration: 15 },
                    { type: "dejeuner", start: "13:00", duration: 45 },
                    { type: "aprem", start: "15:30", duration: 15 }
                ]
            });
        }
    }
    await saveAllData();
}

function generateTotpSecret() { const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let secret=''; for(let i=0;i<32;i++) secret+=chars[Math.floor(Math.random()*chars.length)]; return secret; }
function verifyTotp(secret, token) { try { const totp = new OTPAuth.TOTP({ issuer: 'AllAcces', label: 'user', algorithm: 'SHA1', digits: 6, period: 30, secret: OTPAuth.Secret.fromBase32(secret) }); return totp.validate({ token, window: 1 }) === 0; } catch(e) { return false; } }

function renderDashboard() {
    const today = getTodayStr();
    const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - ((weekStart.getDay()+6)%7));
    const weekStartStr = weekStart.toISOString().split('T')[0];
    const period = document.getElementById('dashboardPeriod')?.value || 'today';
    const filterDate = p => period === 'week' ? (p.date >= weekStartStr && p.date <= today) : p.date === today;
    const filtered = pointages.filter(filterDate);
    const signedArr = filtered.filter(p => p.type === 'arrivee' && p.signe).length;
    const absentCount = absences.filter(a => a.startDate <= today && a.endDate >= today).length;
    const total = collaborators.length;
    const presents = collaborators.filter(c => filtered.some(p => p.collaboratorId === c.id && p.type === 'arrivee' && p.signe)).length;
    const nonPointes = Math.max(0, total - presents - absentCount);
    const contratsExpires = contracts.filter(ct => ct.actif && ct.dateFin && new Date(ct.dateFin) < new Date());
    const contratsSoon = contracts.filter(ct => { if (!ct.actif||!ct.dateFin) return false; const d=(new Date(ct.dateFin)-new Date())/86400000; return d>=0&&d<=30; });
    const congesAttente = leaveRequests.filter(l => l.statut==='en_attente').length;
    let html = `<div class="d-flex align-items-center mb-3 gap-2"><h5>Tableau de bord</h5><select id="dashboardPeriod" class="form-select form-select-sm w-auto" onchange="renderDashboard()"><option value="today" ${period==='today'?'selected':''}>Aujourd'hui</option><option value="week" ${period==='week'?'selected':''}>Cette semaine</option></select></div>
    ${contratsExpires.length?`<div class="alert alert-danger py-2 mb-2">⚠️ ${contratsExpires.length} contrat(s) expiré(s)</div>`:''}
    ${contratsSoon.length?`<div class="alert alert-warning py-2 mb-2">⚠️ ${contratsSoon.length} contrat(s) expirent dans 30j</div>`:''}
    ${congesAttente?`<div class="alert alert-info py-2 mb-2">📋 ${congesAttente} demande(s) de congé en attente</div>`:''}
    <div class="row g-3 mb-3"><div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Collaborateurs</h6><h2>${total}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Présents</h6><h2 class="text-success">${presents}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Absents</h6><h2 class="text-danger">${absentCount}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Non pointés</h6><h2 class="text-warning">${nonPointes}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Équipes</h6><h2>${teams.length}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Contrats actifs</h6><h2>${contracts.filter(c=>c.actif).length}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Congés en attente</h6><h2 class="text-warning">${congesAttente}</h2></div></div>
    <div class="col-6 col-md-3"><div class="card p-3 text-center"><h6>Arrivées signées</h6><h2>${signedArr}</h2></div></div></div>
    <div class="row"><div class="col-md-5"><canvas id="chartDashboard"></canvas></div>
    <div class="col-md-7"><h6>Présence en temps réel</h6><div style="max-height:250px;overflow-y:auto">${
        collaborators.filter(c => filtered.some(p=>p.collaboratorId===c.id&&p.type==='arrivee'&&p.signe)).map(c=>{
            const team = teams.find(t=>t.members?.includes(c.id));
            const pauseEc = pauses.find(p=>p.collaboratorId===c.id&&p.date===today&&p.debut&&!p.fin);
            return `<div class="d-flex align-items-center gap-2 mb-1 p-1 border rounded"><span class="badge ${pauseEc?'bg-warning text-dark':'bg-success'}">${pauseEc?'Pause':'Présent'}</span><strong>${c.name}</strong><small class="text-muted">${team?.name||c.department||''}</small></div>`;
        }).join('') || '<p class="text-muted">Aucun présent</p>'
    }</div></div></div>`;
    document.getElementById('tabDashboard').innerHTML = html;
    new Chart(document.getElementById('chartDashboard'), { type: 'doughnut', data: { labels: ['Présents','Absents','Non pointés'], datasets: [{ data: [presents, absentCount, nonPointes], backgroundColor: ['#198754','#dc3545','#ffc107'] }] } });
}

    if (!c.email || c.email.trim() === "") missing.push("Email");
    if (!c.phone || c.phone.trim() === "") missing.push("Téléphone");
    if (!c.company) missing.push("Société");
    return missing;
}

function getSoldeConges(collabId) {
    const c = collaborators.find(co => co.id === collabId);

    const pris = leaveRequests.filter(l => l.collaboratorId === collabId && l.statut === 'approuve').reduce((s,l) => s + (l.nbJours || 0), 0);
    return { total, pris, restants: total - pris };
}

function showTotpQr(collabId) { const c = collaborators.find(c => c.id === collabId); if (!c) return; if (!c.totpSecret) { c.totpSecret = generateTotpSecret(); saveAllData(); } const totp = new OTPAuth.TOTP({ issuer: 'AllAcces', label: c.name, algorithm: 'SHA1', digits: 6, period: 30, secret: OTPAuth.Secret.fromBase32(c.totpSecret) }); const uri = totp.toString(); const qrSrc = `https://quickchart.io/qr?size=200x200&text=${encodeURIComponent(uri)}`; showModal('Configuration Google Authenticator (Admin)', `<p>Scannez ce QR code avec l'application du collaborateur :</p><img src="${qrSrc}" class="img-fluid"><p class="mt-2">Secret : <code>${c.totpSecret}</code></p><p>Entrez le code à 6 chiffres pour activer :</p><input type="text" id="totpActivationCode" class="form-control" placeholder="Code"><button class="btn btn-primary mt-2" onclick="activateTotp(${c.id})">Activer pour ce collaborateur</button><p class="text-danger">⚠️ L'activation doit être faite en présence du collaborateur.</p>`); }
function activateTotp(collabId) { const c = collaborators.find(c => c.id === collabId); const code = document.getElementById('totpActivationCode')?.value; if (!code || code.length !== 6) { alert('Code 6 chiffres requis'); return; } if (verifyTotp(c.totpSecret, code)) { c.totpActive = true; saveAllData(); closeModal(); alert('TOTP activé avec succès !'); renderCollaborateursList(); if (currentUser && currentUser.type === 'collab' && currentUser.id === collabId) renderCollabDashboard(); } else { alert('Code invalide.'); } }
function exportCollabsExcel() { const data = collaborators.map(c => { const contrat = contracts.find(ct => ct.collaboratorId === c.id && ct.actif); const team = teams.find(t => t.members?.includes(c.id)); const conges = getSoldeConges(c.id); return { 'Nom':c.name, 'Prénom':c.prenom, 'Poste':c.poste||'', 'Opération':c.department||'', 'Équipe':team?.name||'', 'Téléphone':c.phone||'', 'Email':c.email||'', 'CIN':c.cin||'', 'RIB':c.rib||'', 'CNSS':c.cnss||'', 'Date naissance':c.dateNaissance||'', 'Date entrée':c.dateEntree||'', 'Genre':c.genre||'', 'Société':c.company||'', 'Contrat':contrat?.type||'', 'Fin contrat':contrat?.dateFin||'', 'Congés total':conges.total, 'Congés pris':conges.pris, 'Congés restants':conges.restants, 'TOTP activé':c.totpActive ? 'Oui' : 'Non' }; }); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Collaborateurs'); XLSX.writeFile(wb, `collaborateurs_${getTodayStr()}.xlsx`); }

function renderPlanification() { let html = `<div class="d-flex justify-content-between mb-3"><h5>Planification personnalisée des collaborateurs</h5><button class="btn btn-primary btn-sm" onclick="showEditAllPlannings()">Modifier tous</button></div><div class="row g-3">`; for (const c of collaborators) { const plan = plannings.find(p => p.collaboratorId === c.id); if (!plan) continue; html += `<div class="col-md-4"><div class="rh-card p-3"><div class="d-flex justify-content-between"><strong>${c.name}</strong> <span class="badge bg-secondary">${c.company||'—'}</span></div><table class="table table-sm mt-2"><tr><td class="text-muted">Arrivée prévue</td><td>${plan.startTime}</td></tr><tr><td class="text-muted">Départ prévue</td><td>${plan.endTime}</td></tr><tr><td colspan="2"><strong>Pauses recommandées</strong></td></tr>${plan.breaks.map(b => `<td><td>${PAUSE_CONFIG[b.type]?.label || b.type}</td><td>${b.start} (${b.duration} min)</td></tr>`).join('')}</table><button class="btn btn-sm btn-outline-primary" onclick="editPlanning(${c.id})"><i class="fas fa-edit"></i> Modifier planning</button></div></div>`; } html += `</div>`; document.getElementById('tabPlanification').innerHTML = html; }
function editPlanning(collabId) { const c = collaborators.find(c => c.id === collabId); const plan = plannings.find(p => p.collaboratorId === collabId); if (!plan) return; const breaksHtml = ['matin','dejeuner','aprem'].map(type => { const b = plan.breaks.find(b => b.type === type) || { type, start: "12:00", duration: PAUSE_CONFIG[type].duree }; return `<div class="row g-2 mb-2"><div class="col-4"><label>${PAUSE_CONFIG[type].label}</label></div><div class="col-4"><input type="time" class="form-control" id="break_${type}_start" value="${b.start}"></div><div class="col-4"><input type="number" class="form-control" id="break_${type}_dur" value="${b.duration}" step="5" min="0"></div></div>`; }).join(''); const form = `<div class="row g-2"><div class="col-6"><label>Heure d'arrivée prévue</label><input type="time" id="plan_start" class="form-control" value="${plan.startTime}"></div><div class="col-6"><label>Heure de départ prévue</label><input type="time" id="plan_end" class="form-control" value="${plan.endTime}"></div><div class="col-12"><h6>Pauses recommandées</h6>${breaksHtml}</div></div>`; openRhModal(`Planning de ${c.name}`, form, () => { plan.startTime = document.getElementById('plan_start').value; plan.endTime = document.getElementById('plan_end').value; for (const type of ['matin','dejeuner','aprem']) { const b = plan.breaks.find(b => b.type === type); if (b) { b.start = document.getElementById(`break_${type}_start`).value; b.duration = parseInt(document.getElementById(`break_${type}_dur`).value); } else { plan.breaks.push({ type, start: document.getElementById(`break_${type}_start`).value, duration: parseInt(document.getElementById(`break_${type}_dur`).value) }); } } saveAllData(); renderPlanification(); if (currentUser.type === 'collab' && currentUser.id === collabId) renderCollabDashboard(); }); }

function renderConges(filterStatut='all') { let list = leaveRequests; if(filterStatut!=='all') list = list.filter(l=>l.statut===filterStatut); const pending = leaveRequests.filter(l=>l.statut==='en_attente').length; let html = `<div class="d-flex flex-wrap justify-content-between mb-3"><h5>Congés ${pending?`<span class="badge bg-warning text-dark">${pending} en attente</span>`:''}</h5><div><select onchange="renderConges(this.value)" class="form-select-sm" style="width:160px"><option value="all">Tous</option><option value="en_attente">En attente</option><option value="approuve">Approuvés</option><option value="rejete">Rejetés</option></select> <button class="btn btn-primary btn-sm" onclick="showAddCongeModal()">Ajouter</button></div></div><div class="row g-2">`; list.forEach(l => { const c = collaborators.find(co=>co.id===l.collaboratorId); const statusClass = l.statut==='approuve'?'leave-approved':l.statut==='rejete'?'leave-rejected':'leave-pending'; const badgeClass = l.statut==='approuve'?'bg-success':l.statut==='rejete'?'bg-danger':'bg-warning text-dark'; html += `<div class="col-md-6"><div class="rh-card p-3 ${statusClass}"><div class="d-flex justify-content-between"><div><strong>${c?.name||'?'}</strong> <span class="badge ${badgeClass}">${l.statut.replace('_',' ')}</span></div><div>${l.statut==='en_attente'?`<button class="btn btn-xs btn-success" onclick="validerConge('${l.id}','approuve')"><i class="fas fa-check"></i></button> <button class="btn btn-xs btn-danger" onclick="validerConge('${l.id}','rejete')"><i class="fas fa-times"></i></button>`:''}<button class="btn btn-xs btn-danger" onclick="deleteConge('${l.id}')"><i class="fas fa-trash"></i></button></div></div><div class="small mt-1"><span class="badge bg-secondary">${l.type}</span> ${l.dateDebut} → ${l.dateFin} <strong>(${l.nbJours}j)</strong></div>${l.motif?`<div class="small text-muted mt-1">${l.motif}</div>`:''}</div></div>`; }); html += `</div>`; document.getElementById('tabConges').innerHTML = html; }
function buildCongeForm() { return `<div class="row g-2"><div class="col-12"><label>Collaborateur *</label><select id="cg_collab" class="form-select">${collaborators.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div class="col-md-6"><label>Type</label><select id="cg_type" class="form-select"><option>Congé annuel</option><option>Maladie</option><option>Sans solde</option><option>RTT</option></select></div><div class="col-md-6"><label>Statut</label><select id="cg_statut" class="form-select"><option value="en_attente">En attente</option><option value="approuve">Approuvé</option><option value="rejete">Rejeté</option></select></div><div class="col-md-6"><label>Date début *</label><input type="date" id="cg_debut" class="form-control" oninput="calcNbJours()"></div><div class="col-md-6"><label>Date fin *</label><input type="date" id="cg_fin" class="form-control" oninput="calcNbJours()"></div><div class="col-12"><label>Nombre de jours ouvrés</label><input type="number" id="cg_jours" class="form-control" step="0.5" value="1"></div><div class="col-12"><label>Motif</label><textarea id="cg_motif" class="form-control" rows="2"></textarea></div></div>`; }
function calcNbJours() { const d = document.getElementById('cg_debut')?.value, f = document.getElementById('cg_fin')?.value; if(!d||!f) return; let count=0, cur=new Date(d+'T00:00:00'), end=new Date(f+'T00:00:00'); while(cur<=end){const day=cur.getDay(); if(day!==0&&day!==6) count++; cur.setDate(cur.getDate()+1);} const el=document.getElementById('cg_jours'); if(el) el.value=count; }
async function showAddCongeModal() { openRhModal('Nouvelle demande de congé', buildCongeForm(), () => { const collabId = parseInt(document.getElementById('cg_collab')?.value); if(!collabId) return alert('Collaborateur requis'); const dateDebut = document.getElementById('cg_debut')?.value, dateFin = document.getElementById('cg_fin')?.value; if(!dateDebut||!dateFin) return alert('Dates requises'); const id = 'cg_'+Date.now(); leaveRequests.push({ id, collaboratorId: collabId, type: document.getElementById('cg_type')?.value, statut: document.getElementById('cg_statut')?.value, dateDebut, dateFin, nbJours: parseFloat(document.getElementById('cg_jours')?.value) || 1, motif: document.getElementById('cg_motif')?.value?.trim() || '', createdAt: getTodayStr() }); saveAllData(); renderConges(); renderCollaborateursList(); }); }
async function validerConge(id, statut) { const l = leaveRequests.find(l=>l.id===id); if(l) { l.statut = statut; saveAllData(); renderConges(); renderCollaborateursList(); } }
async function deleteConge(id) { if(confirm('Supprimer cette demande ?')) { leaveRequests = leaveRequests.filter(l=>l.id!==id); saveAllData(); renderConges(); renderCollaborateursList(); } }

async function editSalaire(collabId) { const c = collaborators.find(co=>co.id===collabId); const sal = salaries.find(s=>s.collaboratorId===collabId); openRhModal(`Salaire — ${c.name}`, `<div class="row g-2"><div class="col-md-6"><label>Salaire brut *</label><input type="number" id="sal_montant" class="form-control" value="${sal?.montant||''}"></div><div class="col-md-6"><label>Devise</label><select id="sal_devise" class="form-select"><option value="TND" ${sal?.devise==='TND'||!sal?'selected':''}>TND</option><option value="EUR" ${sal?.devise==='EUR'?'selected':''}>EUR</option><option value="USD" ${sal?.devise==='USD'?'selected':''}>USD</option></select></div><div class="col-12"><label>Notes</label><textarea id="sal_notes" class="form-control" rows="2">${sal?.notes||''}</textarea></div></div>`, () => { const montant = parseFloat(document.getElementById('sal_montant')?.value); if(isNaN(montant)) return alert('Montant invalide'); const id = `sal_${collabId}`; const existing = salaries.find(s=>s.collaboratorId===collabId); const newSal = { id, collaboratorId: collabId, montant, devise: document.getElementById('sal_devise')?.value || 'TND', notes: document.getElementById('sal_notes')?.value?.trim() || '', updatedAt: getTodayStr() }; if(existing) Object.assign(existing, newSal); else salaries.push(newSal); saveAllData(); renderSalairesList(); }); }

function renderOrganigramme() { const depts = {}; collaborators.forEach(c => { const d = c.department || 'Non défini'; if(!depts[d]) depts[d] = { collabs: [], teams: [] }; depts[d].collabs.push(c); }); teams.forEach(t => { const dept = t.departement || 'Non défini'; if(!depts[dept]) depts[dept] = { collabs: [], teams: [] }; depts[dept].teams.push(t); }); let html = `<div class="d-flex justify-content-between mb-3"><h5>🏢 Organigramme</h5><small>${collaborators.length} collaborateurs · ${teams.length} équipes · ${Object.keys(depts).length} opérations</small></div>`; for(const [dept, data] of Object.entries(depts)) { const deptTeams = data.teams; const memberIds = new Set(deptTeams.flatMap(t=>t.members||[])); const noTeam = data.collabs.filter(c=>!memberIds.has(c.id)); html += `<div class="org-dept mb-3"><div class="d-flex gap-2 mb-2"><i class="fas fa-building text-primary"></i><strong>${dept}</strong><span class="badge bg-primary">${data.collabs.length}</span></div>`; for(const t of deptTeams) { const chef = collaborators.find(c=>c.id===t.chefId); const members = (t.members||[]).map(id=>collaborators.find(c=>c.id===id)).filter(Boolean); html += `<div class="org-team"><div class="d-flex gap-2 mb-1"><i class="fas fa-users text-success"></i><strong>${t.name}</strong>${chef?`<span class="text-muted small">— Chef : <strong>${chef.name}</strong></span>`:''}<span class="badge bg-success">${members.length}</span></div>`; for(const m of members) { html += `<div class="org-member d-flex gap-2"><i class="fas fa-user-circle text-muted"></i><span>${m.name}</span>${m.poste?`<small class="text-muted">(${m.poste})</small>`:''}${t.chefId===m.id?'<span class="chef-badge">Chef</span>':''}</div>`; } html += `</div>`; } if(noTeam.length) html += `<div class="org-team"><div class="text-muted small mb-1"><i class="fas fa-user me-1"></i>Sans équipe assignée</div>${noTeam.map(m=>`<div class="org-member">${m.name} ${m.poste?`<small class="text-muted">(${m.poste})</small>`:''}</div>`).join('')}</div>`; html += `</div>`; } document.getElementById('tabOrganigramme').innerHTML = html; }

// ==================== POINTAGES ====================
function renderPointagesList() {
    const filterText = document.getElementById('searchPointage')?.value || '';
    const filterStatus = document.getElementById('filterStatus')?.value || 'all';
    const pairs = {};
    pointages.forEach(p => {
        const key = `${p.collaboratorId}_${p.date}`;
        if(!pairs[key]) pairs[key] = { collaboratorId: p.collaboratorId, date: p.date, arrivee: null, depart: null };
        if(p.type === 'arrivee') pairs[key].arrivee = p;
        else if(p.type === 'depart') pairs[key].depart = p;
    });
    let rows = Object.values(pairs).map(r => {
        const c = collaborators.find(co => co.id === r.collaboratorId);
        const com = comments.find(co => co.collaboratorId === r.collaboratorId && co.date === r.date);
        const h = computeHeuresNettes(r.collaboratorId, r.date);
        return { ...r, collabName: c?.name || '?', dept: c?.department || '—', commentText: com?.text || '', heures: h };
    });
    if(filterText) rows = rows.filter(r => r.collabName.toLowerCase().includes(filterText.toLowerCase()));
    if(filterStatus === 'complet') rows = rows.filter(r => r.arrivee?.signe && r.depart?.signe);
    else if(filterStatus === 'incomplet') rows = rows.filter(r => !r.arrivee?.signe || !r.depart?.signe);
    else if(filterStatus === 'depassement') rows = rows.filter(r => r.heures && r.heures.depassement > 0);
    rows.sort((a,b)=>b.date.localeCompare(a.date) || a.collabName.localeCompare(b.collabName));
    const totalJours = rows.length;
    const totalNetMin = rows.reduce((acc,r)=>acc+(r.heures?r.heures.nettes*60:0),0);
    const totalDepMin = rows.reduce((acc,r)=>acc+(r.heures?r.heures.depassement*60:0),0);
    const nbDep = rows.filter(r=>r.heures&&r.heures.depassement>0).length;
    const fmtCell = (p) => {
        if(!p) return '<span class="text-muted">—</span>';
        const sig = p.signe ? '<span class="text-success ms-1">✓</span>' : '<span class="text-danger ms-1">⌛</span>';
        return `<strong>${p.time}</strong>${sig}`;
    };
    let html = `<div class="row g-2 mb-3"><div class="col-3"><div class="card p-2 text-center"><small>Journées</small><div class="fw-bold">${totalJours}</div></div></div>
    <div class="col-3"><div class="card p-2 text-center"><small>Heures nettes</small><div class="fw-bold text-success">${formatHeures(totalNetMin/60)}</div></div></div>
    <div class="col-3"><div class="card p-2 text-center"><small>Dépassements</small><div class="fw-bold text-danger">${Math.round(totalDepMin)}min</div></div></div>
    <div class="col-3"><div class="card p-2 text-center"><small>Jours avec dép.</small><div class="fw-bold text-warning">${nbDep}</div></div></div></div>
    <div class="table-responsive"><table class="table table-bordered"><thead class="table-dark"><tr><th>Collaborateur</th><th>Opération</th><th>Date</th><th>Arrivée</th><th>Départ</th><th>Temps brut</th><th>Dép. pause</th><th>Temps net</th><th>Commentaire</th><th>Actions</th></tr></thead><tbody>`;
    rows.forEach(r => {
        const h = r.heures;
        const depMin = h?Math.round(h.depassement*60):0;
        const brutCell = h?formatHeures(h.brutes):'—';
        const depCell = depMin>0?`<span class="badge bg-danger">-${depMin}min</span>`:'—';
        const netCell = h?`<strong class="${h.depassement>0?'text-danger':'text-success'}">${formatHeures(h.nettes)}</strong>`:'—';
        html += `<tr><td><strong>${r.collabName}</strong></td><td><small>${r.dept}</small></td><td>${r.date}</td><td>${fmtCell(r.arrivee)}</td><td>${fmtCell(r.depart)}</td><td>${brutCell}</td><td>${depCell}</td><td>${netCell}</td><td><small>${r.commentText||''}</small></td>
        <td class="text-nowrap">${r.arrivee?`<button class="btn btn-xs btn-outline-success" onclick="signFromAdmin(${r.collaboratorId},'${r.date}','arrivee')"><i class="fas fa-pen"></i></button>`:''}
        ${r.depart?`<button class="btn btn-xs btn-outline-danger" onclick="signFromAdmin(${r.collaboratorId},'${r.date}','depart')"><i class="fas fa-pen"></i></button>`:''}
        ${r.arrivee?`<button class="btn btn-xs btn-outline-warning" onclick="editPointage('${r.arrivee.id}')"><i class="fas fa-edit"></i></button>`:''}
        ${r.depart?`<button class="btn btn-xs btn-outline-warning" onclick="editPointage('${r.depart.id}')"><i class="fas fa-edit"></i></button>`:''}
        ${r.arrivee?`<button class="btn btn-xs btn-outline-danger" onclick="deletePointage('${r.arrivee.id}')"><i class="fas fa-trash"></i></button>`:''}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('pointageList').innerHTML = html;
}

async function recordSignature(collaboratorId, date, type) {
    const existing = pointages.find(p => p.collaboratorId === collaboratorId && p.date === date && p.type === type);
    const now = getNowStr();
    if(existing) { existing.time = now; existing.signe = true; }
    else { const newId = (await getNextId('pointage')).toString(); pointages.push({ id:newId, collaboratorId, date, type, time:now, signe:true }); }
    saveAllData();
}
async function signFromAdmin(collabId, date, type) {
    const collab = collaborators.find(c=>c.id===collabId);
    if(!collab) return;
    showPinPad(async pin => {
        if(collab.pin !== pin) { alert('PIN incorrect'); return false; }
        if(settings.securityMode === 'totp') {
            if(!collab.totpActive) { alert('Le collaborateur n\'a pas encore activé son TOTP.'); return false; }
            return showTotpVerification(async token => {
                if(verifyTotp(collab.totpSecret, token)) {
                    await recordSignature(collabId, date, type);
                    renderPointagesList();
                    return true;
                } else { alert('Code TOTP invalide'); return false; }
            });
        } else {
            await recordSignature(collabId, date, type);
            renderPointagesList();
            return true;
        }
    });
}

// ==================== PAUSES (séparation par opération, rotation indépendante) ====================
let pauseInterval = null; let _pauseUnsub = null;
function startPausesRealtime() {
    if (_pauseUnsub) _pauseUnsub();
    if (window.db && window.fsOnSnapshot) {
        _pauseUnsub = window.fsOnSnapshot(window.fsCollection(window.db, 'pauses'), snap => {
            pauses = snap.docs.map(d => d.data());
            if (document.getElementById('pausesContainer')) renderPausesGrouped();
        });
    } else {
        if(pauseInterval) clearInterval(pauseInterval);
        pauseInterval = setInterval(async () => {
            pauses = await fbLoadCollection('pauses');
            if (document.getElementById('pausesContainer')) renderPausesGrouped();
        }, 5000);
    }
}
function stopPausesRealtime() { if (_pauseUnsub) { _pauseUnsub(); _pauseUnsub = null; } if(pauseInterval) clearInterval(pauseInterval); }
function renderPausesTab() {
    document.getElementById('tabPauses').innerHTML = `<div class="d-flex align-items-center mb-3 gap-2 flex-wrap"><h5><span class="live-dot"></span>Suivi des pauses par opération</h5><select id="pauseFilterStatut" class="form-select-sm" onchange="renderPausesGrouped()"><option value="all">Tous</option><option value="en_pause">En pause</option><option value="disponible">Disponible</option><option value="depasse">Dépassement en cours</option></select><input type="date" id="pauseExportDate" class="form-control-sm" value="${getTodayStr()}"><button class="btn btn-success btn-sm" onclick="exportPausesExcel()">Export pauses</button></div><div id="pausesContainer"></div>`;
    renderPausesGrouped();
}
function renderPausesGrouped() {
    const today = getTodayStr();
    const filterStatut = document.getElementById('pauseFilterStatut')?.value || 'all';
    // Récupérer les collaborateurs présents aujourd'hui
    const allPresents = collaborators.filter(c => pointages.some(p => p.collaboratorId===c.id && p.date===today && p.type==='arrivee' && p.signe));
    let filtered = [...allPresents];
    if(filterStatut !== 'all') {
        filtered = filtered.filter(c => {
            const cp = pauses.filter(p=>p.collaboratorId===c.id);
            const enCours = cp.find(p=>p.debut&&!p.fin);
            if(filterStatut==='en_pause') return !!enCours;
            if(filterStatut==='depasse') return enCours && minutesSince(enCours.debut) > PAUSE_CONFIG[enCours.type].duree;
            if(filterStatut==='disponible') return !enCours;
            return true;
        });
    }
    // Grouper par opération (department)
    const groups = {};
    for (const c of filtered) {
        const op = c.department || "Sans opération";
        if (!groups[op]) groups[op] = [];
        groups[op].push(c);
    }
    // Pour chaque groupe, appliquer sa propre rotation (stockée dans pauseRotationPerOp)
    // mais l'affichage se fait simplement dans l'ordre du tableau (on peut trier selon l'ordre rotatif si désiré)
    // Ici on affiche dans l'ordre alphabétique par nom, mais vous pouvez appliquer un tri personnalisé.
    const container = document.getElementById('pausesContainer');
    if (!container) return;
    if (Object.keys(groups).length === 0) {
        container.innerHTML = '<div class="alert alert-info">Aucun collaborateur présent pour le filtre sélectionné.</div>';
        return;
    }
    let html = '';
    for (const [opName, collabs] of Object.entries(groups)) {
        // Trier les collaborateurs selon l'ordre rotatif de cette opération (stocké)
        const rotation = pauseRotationPerOp[opName] || [];
        let ordered = [...collabs];
        if (rotation.length) {
            ordered.sort((a,b) => {
                const idxA = rotation.indexOf(a.id);
                const idxB = rotation.indexOf(b.id);
                if (idxA === -1 && idxB === -1) return a.name.localeCompare(b.name);
                if (idxA === -1) return 1;
                if (idxB === -1) return -1;
                return idxA - idxB;
            });
        } else {
            ordered.sort((a,b) => a.name.localeCompare(b.name));
        }
        html += `<div class="ops-block"><div class="ops-title"><i class="fas fa-layer-group"></i> ${opName}</div>
        <div class="table-responsive"><table class="table table-bordered"><thead class="table-dark"><tr><th>Ordre</th><th>Collaborateur</th><th>☕ Matin</th><th>🍽️ Déjeuner</th><th>🧃 Après-midi</th><th>Statut actuel</th><th>Heures nettes</th><th>Dépassements</th></tr></thead><tbody>`;
        ordered.forEach((c, idx) => {
            const collabPauses = pauses.filter(p=>p.collaboratorId===c.id);
            const pauseEnCours = collabPauses.find(p=>p.debut&&!p.fin);
            let statutHtml = '<span class="text-muted">—</span>';
            if(pauseEnCours) {
                const cfg = PAUSE_CONFIG[pauseEnCours.type];
                const elapsed = minutesSince(pauseEnCours.debut);
                const reste = cfg.duree - elapsed;
                if(reste>0) statutHtml = `<span class="pause-badge pause-en-cours">${cfg.icon} En pause (${Math.floor(elapsed)}min) — <span class="timer-live">${Math.ceil(reste)}min rest.</span></span>`;
                else statutHtml = `<span class="pause-badge pause-depasse">⚠️ Dépassée de ${Math.ceil(-reste)}min</span>`;
            }
            const cols = ['matin','dejeuner','aprem'].map(type => {
                const p = collabPauses.find(p=>p.type===type);
                if(!p) return '<td><span class="pause-badge pause-dispo">—</span></td>';
                if(p.debut&&!p.fin) return `<td><span class="pause-badge pause-en-cours">${p.debut} → en cours</span></td>`;
                return `<td><span class="pause-badge ${p.depassement?'pause-depasse':'pause-termine'}">${p.debut}→${p.fin}</span></td>`;
            }).join('');
            const h = computeHeuresNettes(c.id, today);
            const heuresHtml = h?`<strong>${formatHeures(h.nettes)}</strong>${h.depassement>0?`<br><small class="text-danger">-${Math.round(h.depassement*60)}min</small>`:''}`:'—';
            const nbDep = collabPauses.filter(p=>p.depassement).length;
            const depHtml = nbDep?`<span class="badge bg-danger">${nbDep} dép.</span>`:'—';
            html += `<tr><td class="text-muted">${idx+1}</td><td><strong>${c.name}</strong><br><small>${c.company||''}</small></td>${cols}<td>${statutHtml}</td><td>${heuresHtml}</td><td>${depHtml}</td></tr>`;
        });
        html += `</tbody></table></div></div>`;
    }
    container.innerHTML = html;
}
function minutesSince(timeStr) {
    const now = new Date();
    const [h,m] = timeStr.split(':').map(Number);
    const start = new Date(); start.setHours(h,m,0,0);
    return (now-start)/60000;
}
function exportPausesExcel() {
    const filterDate = document.getElementById('pauseExportDate')?.value || getTodayStr();
    const pausesDuJour = pauses.filter(p=>p.date===filterDate);
    if(pausesDuJour.length===0) return alert('Aucune pause');
    const data = [];
    collaborators.forEach(c => {
        const cp = pausesDuJour.filter(p=>p.collaboratorId===c.id);
        if(cp.length===0) return;
        ['matin','dejeuner','aprem'].forEach(type => {
            const p = cp.find(p=>p.type===type);
            const cfg = PAUSE_CONFIG[type];
            if(!p) return;
            let dureeReelle='—', depMin=0;
            if(p.debut && p.fin) {
                const [h1,m1] = p.debut.split(':').map(Number);
                const [h2,m2] = p.fin.split(':').map(Number);
                const mins = Math.round(((h2+m2/60)-(h1+m1/60))*60);
                dureeReelle = `${mins} min`;
                depMin = Math.max(0, mins - cfg.duree);
            }
            data.push({ 'Collaborateur':c.name, 'Opération':c.department||'—', 'Date':filterDate, 'Type':cfg.label, 'Durée autorisée':cfg.duree+' min', 'Début':p.debut||'—', 'Fin':p.fin||'En cours', 'Durée réelle':dureeReelle, 'Dépassement (min)':depMin });
        });
    });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Pauses');
    XLSX.writeFile(wb, `pauses_${filterDate}.xlsx`);
}

// ==================== RAPPORTS ====================
function renderRapports() {
    const today = getTodayStr();
    const deptMap = {};
    collaborators.forEach(c => {
        if(!deptMap[c.department]) deptMap[c.department] = { total:0, presents:0 };
        deptMap[c.department].total++;
        const hasArrival = pointages.some(p=>p.collaboratorId===c.id&&p.date===today&&p.type==='arrivee');
        const absent = absences.some(a=>a.collaboratorId===c.id&&a.startDate<=today&&a.endDate>=today);
        if(hasArrival && !absent) deptMap[c.department].presents++;
    });
    const deptLabels = Object.keys(deptMap);
    const deptRates = deptLabels.map(d => deptMap[d].total ? Math.round(deptMap[d].presents/deptMap[d].total*100) : 0);
    const since = new Date(); since.setDate(since.getDate()-30);
    const recentAbs = absences.filter(a=>new Date(a.startDate)>=since);
    const typeCount = {};
    recentAbs.forEach(a=>typeCount[a.type]=(typeCount[a.type]||0)+1);
    const weekStart = new Date(); weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);
    const hoursMap = {}, hoursGrossMap = {};
    pointages.forEach(p => {
        if(new Date(p.date)>=weekStart && p.type==='arrivee' && p.signe) {
            const h = computeHeuresNettes(p.collaboratorId, p.date);
            if(h) { hoursMap[p.collaboratorId]=(hoursMap[p.collaboratorId]||0)+h.nettes; hoursGrossMap[p.collaboratorId]=(hoursGrossMap[p.collaboratorId]||0)+h.brutes; }
        }
    });
    const hourLabels = collaborators.filter(c=>hoursMap[c.id]).map(c=>c.name);
    const hourDataNet = collaborators.filter(c=>hoursMap[c.id]).map(c=>+hoursMap[c.id].toFixed(2));
    const hourDataGross = collaborators.filter(c=>hoursMap[c.id]).map(c=>+hoursGrossMap[c.id].toFixed(2));
    document.getElementById('tabRapports').innerHTML = `<div class="d-flex justify-content-between mb-3"><h5>Rapports</h5><button class="btn btn-success btn-sm" onclick="exportRapportCompletExcel()">Export rapport complet</button></div>
    <div class="row"><div class="col-md-6"><canvas id="chartPresence"></canvas></div><div class="col-md-6"><canvas id="chartAbsences"></canvas></div></div>
    <div class="mt-3"><canvas id="chartHours"></canvas></div>`;

function startCollabPauseTimer(type, dureeMax, debut) { const el = document.getElementById(`collabTimer_${type}`); if(!el) return; const update = () => { const elapsed = minutesSince(debut); const reste = dureeMax - elapsed; if(!document.getElementById(`collabTimer_${type}`)) return; if(reste>0) el.textContent = `${Math.floor(elapsed)}min / ${Math.ceil(reste)}min rest.`; else el.textContent = `⚠ dépassée de ${Math.ceil(-reste)}min`; }; update(); setInterval(() => { if(document.getElementById(`collabTimer_${type}`)) update(); }, 10000); }
async function demarrerPause(type) { const collab = collaborators.find(c=>c.id===currentUser.id); const today = getTodayStr(); if(pauses.find(p=>p.collaboratorId===currentUser.id && p.date===today && p.debut && !p.fin)) return alert('Pause déjà en cours'); if(pauses.find(p=>p.collaboratorId===currentUser.id && p.date===today && p.type===type)) return alert('Pause déjà utilisée'); const arrival = pointages.find(p=>p.collaboratorId===currentUser.id && p.date===today && p.type==='arrivee' && p.signe); if(!arrival) return alert('Signez votre arrivée d\'abord'); showPinPad(async pin => { if(collab.pin !== pin) { alert('PIN incorrect'); return false; } if(settings.securityMode === 'totp') { if(!collab.totpActive) { alert('Double authentification non activée. Contactez l\'admin.'); return false; } return showTotpVerification(async token => { if(verifyTotp(collab.totpSecret, token)) { const newId = `pause_${currentUser.id}_${today}_${type}`; pauses.push({ id:newId, collaboratorId:currentUser.id, date:today, type, debut:getNowStr(), fin:null, depassement:false }); saveAllData(); await renderCollabDashboard(); return true; } else { alert('Code TOTP invalide'); return false; } }); } else { const newId = `pause_${currentUser.id}_${today}_${type}`; pauses.push({ id:newId, collaboratorId:currentUser.id, date:today, type, debut:getNowStr(), fin:null, depassement:false }); saveAllData(); await renderCollabDashboard(); return true; } }); }

function formatHeures(h) { if(h===null||h===undefined) return '—'; const total = Math.abs(h); const hh = Math.floor(total); const mm = Math.round((total - hh)*60); return `${hh}h${mm.toString().padStart(2,'0')}`; }
function computeHeuresNettes(collabId, date) { const arr = pointages.find(p => p.collaboratorId === collabId && p.date === date && p.type === 'arrivee'); const dep = pointages.find(p => p.collaboratorId === collabId && p.date === date && p.type === 'depart'); if(!arr || !dep) return null; const [h1,m1] = arr.time.split(':').map(Number); const [h2,m2] = dep.time.split(':').map(Number); const brutes = (h2 + m2/60) - (h1 + m1/60); if(brutes <= 0) return null; const depassement = getDepassementMinutes(collabId, date); const nettes = brutes - depassement; return { brutes, nettes, depassement }; }
function getDepassementMinutes(collabId, date) { const collabPauses = pauses.filter(p => p.collaboratorId === collabId && p.date === date && p.debut && p.fin); let totalDep = 0; collabPauses.forEach(p => { const cfg = PAUSE_CONFIG[p.type]; if(!cfg) return; const [h1,m1] = p.debut.split(':').map(Number); const [h2,m2] = p.fin.split(':').map(Number); const dureeReelle = (h2 + m2/60) - (h1 + m1/60); const dureeMax = cfg.duree / 60; const dep = dureeReelle - dureeMax; if(dep > 0) totalDep += dep; }); return totalDep; }

// ==================== ROTATION DES PAUSES PAR OPÉRATION ====================
function getTodayKey() { return getTodayStr(); }
function updatePauseRotation() {
    const today = getTodayKey();
    const stored = sessionStorage.getItem("allaccess_pauseRotationPerOp");
    let saved = stored ? JSON.parse(stored) : null;
    // Pour chaque opération existante, créer ou faire tourner l'ordre
    const operations = [...new Set(collaborators.map(c => c.department).filter(d => d && d.trim() !== ""))];
    for (const op of operations) {
        const members = collaborators.filter(c => c.department === op).map(c => c.id);
        if (members.length === 0) continue;
        let order = [];
        if (saved && saved[op] && saved[op].date === today) {
            order = saved[op].order;
        } else if (saved && saved[op] && saved[op].order) {
            // rotation : décaler circulairement
            let prev = saved[op].order;
            if (prev.length >= 2) {
                let lastTwo = prev.slice(-2);
                let rest = prev.slice(0, -2);
                order = [...lastTwo, ...rest];
            } else {
                order = [...prev];
            }
        } else {
            order = [...members];
        }
        pauseRotationPerOp[op] = order;
    }
    // Sauvegarde dans sessionStorage
    const toSave = {};
    for (const op of operations) {
        toSave[op] = { date: today, order: pauseRotationPerOp[op] || [] };
    }
    sessionStorage.setItem("allaccess_pauseRotationPerOp", JSON.stringify(toSave));
}
function ensurePauseRotation() { updatePauseRotation(); }
